<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="時間割">
<title>大学時間割</title>
<style>
  :root {
    --bg: #0f0f14;
    --surface: #1a1a24;
    --surface2: #22222f;
    --border: #2e2e3f;
    --accent: #7c6af7;
    --accent2: #5eead4;
    --text: #e8e8f0;
    --muted: #8888a0;
    --danger: #f87171;
    --success: #4ade80;
    --warning: #fbbf24;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Helvetica Neue', sans-serif; min-height: 100vh; overflow-x: hidden; }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 18px; font-weight: 700; color: var(--accent); }
  .header-btns { display: flex; gap: 8px; }
  .icon-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); height: 34px; padding: 0 12px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; font-weight: 600; white-space: nowrap; }

  .nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
  .nav-tab { flex: 1; padding: 10px; text-align: center; font-size: 13px; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .cal-wrap { overflow-x: auto; padding: 12px; }
  .cal { display: grid; grid-template-columns: 56px repeat(6, 1fr); min-width: 480px; gap: 2px; }
  .cal-head { text-align: center; font-size: 11px; font-weight: 700; color: var(--muted); padding: 6px 2px; }
  .cal-head.today { color: var(--accent); }
  .time-label { font-size: 9px; color: var(--muted); text-align: right; padding-right: 6px; line-height: 1.4; display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-start; padding-top: 4px; gap: 1px; }
  .time-label .tl-period { font-weight: 700; font-size: 10px; color: var(--text); }
  .time-label .tl-time { font-size: 9px; color: var(--muted); }
  .cal-cell { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; min-height: 52px; position: relative; cursor: pointer; transition: background .15s; }
  .cal-cell:hover { background: var(--surface2); }
  .class-block { position: absolute; inset: 2px; border-radius: 5px; padding: 4px 5px; overflow: hidden; display: flex; flex-direction: column; gap: 1px; }
  .class-block .cb-name { font-size: 11px; font-weight: 700; line-height: 1.2; }
  .class-block .cb-room { font-size: 10px; opacity: .75; }
  .class-block .cb-badge { position: absolute; top: 3px; right: 3px; width: 7px; height: 7px; border-radius: 50%; background: var(--warning); }

  .c0{background:rgba(124,106,247,.25);border-left:3px solid #7c6af7}
  .c1{background:rgba(94,234,212,.2);border-left:3px solid #5eead4}
  .c2{background:rgba(251,191,36,.2);border-left:3px solid #fbbf24}
  .c3{background:rgba(248,113,113,.2);border-left:3px solid #f87171}
  .c4{background:rgba(74,222,128,.2);border-left:3px solid #4ade80}
  .c5{background:rgba(251,146,60,.2);border-left:3px solid #fb923c}
  .c6{background:rgba(232,121,249,.2);border-left:3px solid #e879f9}
  .c7{background:rgba(56,189,248,.2);border-left:3px solid #38bdf8}

  .assignments { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .assign-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; display: flex; align-items: flex-start; gap: 10px; }
  .assign-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all .2s; }
  .assign-check.done { background: var(--success); border-color: var(--success); }
  .assign-check.done::after { content: '✓'; font-size: 11px; color: #000; font-weight: 800; }
  .assign-info { flex: 1; }
  .assign-name { font-size: 14px; font-weight: 600; }
  .assign-name.done { text-decoration: line-through; opacity: .5; }
  .assign-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .assign-due { font-size: 11px; margin-top: 4px; padding: 2px 7px; border-radius: 20px; display: inline-block; }
  .due-soon { background: rgba(248,113,113,.2); color: var(--danger); }
  .due-ok { background: rgba(74,222,128,.15); color: var(--success); }
  .due-today { background: rgba(251,191,36,.2); color: var(--warning); }
  .del-btn { color: var(--muted); background: none; border: none; cursor: pointer; font-size: 16px; padding: 4px; }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
  .overlay.center { align-items: center; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; padding: 20px 16px 32px; }
  .overlay.center .modal { border-radius: 20px; margin: 16px; max-height: 85vh; }
  .modal-drag { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  .detail-section { margin-bottom: 16px; }
  .detail-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  .detail-value { font-size: 15px; }
  .detail-value a { color: var(--accent2); text-decoration: none; }
  .assign-list-modal { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .assign-row { display: flex; align-items: center; gap: 8px; background: var(--surface2); border-radius: 8px; padding: 8px 10px; }
  .assign-row .assign-check { width: 18px; height: 18px; }
  .assign-row-info { flex: 1; }
  .assign-row-name { font-size: 13px; }
  .assign-row-due { font-size: 11px; color: var(--muted); }

  .form-group { margin-bottom: 14px; }
  .form-group label { font-size: 12px; color: var(--muted); margin-bottom: 5px; display: block; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 12px; font-size: 15px; outline: none; -webkit-appearance: none; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 70px; font-family: inherit; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn { padding: 12px; border-radius: 10px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; transition: opacity .2s; }
  .btn:active { opacity: .8; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-row { display: flex; gap: 8px; margin-top: 16px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .section-header span { font-size: 14px; font-weight: 600; }
  .add-small { background: var(--surface2); border: 1px solid var(--border); color: var(--accent); border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; }

  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty div { font-size: 32px; margin-bottom: 8px; }
  .empty p { font-size: 14px; }

  .fab { position: fixed; bottom: 24px; right: 20px; width: 52px; height: 52px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(124,106,247,.5); cursor: pointer; z-index: 150; border: none; }
  .week-nav { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 8px 16px; font-size: 13px; color: var(--muted); }
  .week-nav button { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px 8px; }

  /* スケジュール変更モーダル */
  .schedule-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .schedule-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; }
  .schedule-item-info { font-size: 13px; }
  .schedule-item-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .schedule-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; }
  .badge-move { background: rgba(124,106,247,.2); color: var(--accent); }
  .badge-cancel { background: rgba(248,113,113,.2); color: var(--danger); }
</style>
</head>
<body>

<div class="header">
  <h1>時間割</h1>
  <div class="header-btns">
    <div class="icon-btn" onclick="openAddAssign()">＋ 課題</div>
  </div>
</div>
<div class="nav">
  <div class="nav-tab active" id="tab-cal" onclick="switchTab('cal')">カレンダー</div>
  <div class="nav-tab" id="tab-assign" onclick="switchTab('assign')">課題</div>
</div>

<div id="view-cal">
  <div class="week-nav">
    <button onclick="changeWeek(-1)">‹</button>
    <span id="week-label"></span>
    <button onclick="changeWeek(1)">›</button>
  </div>
  <div class="cal-wrap">
    <div class="cal" id="cal-grid"></div>
  </div>
</div>

<div id="view-assign" style="display:none">
  <div id="assign-list" class="assignments"></div>
</div>

<button class="fab" onclick="openAddClass()">＋</button>

<!-- Detail modal -->
<div class="overlay" id="detail-overlay" style="display:none" onclick="closeDetail(event)">
  <div class="modal">
    <div class="modal-drag"></div>
    <div id="detail-content"></div>
  </div>
</div>

<!-- Add/Edit class modal -->
<div class="overlay center" id="class-overlay" style="display:none" onclick="closeClassForm(event)">
  <div class="modal">
    <div class="modal-drag"></div>
    <h2 id="class-form-title">授業を追加</h2>
    <div class="form-group">
      <label>授業名 *</label>
      <input id="f-name" type="text" placeholder="例: 線形代数学">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>曜日 *</label>
        <select id="f-day">
          <option value="0">月曜日</option><option value="1">火曜日</option>
          <option value="2">水曜日</option><option value="3">木曜日</option>
          <option value="4">金曜日</option><option value="5">土曜日</option>
        </select>
      </div>
      <div class="form-group">
        <label>時限 *</label>
        <select id="f-period">
          <option value="0">1限 (8:30〜10:00)</option>
          <option value="1">2限 (10:20〜11:50)</option>
          <option value="2">3限 (12:40〜14:10)</option>
          <option value="3">4限 (14:30〜16:00)</option>
          <option value="4">5限 (16:20〜17:50)</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>教室</label><input id="f-room" type="text" placeholder="例: 2号館 301"></div>
    <div class="form-group"><label>担当教員名</label><input id="f-teacher" type="text" placeholder="例: 山田 太郎"></div>
    <div class="form-group"><label>教員メールアドレス</label><input id="f-email" type="email" placeholder="例: yamada@univ.ac.jp"></div>
    <div class="form-group"><label>オフィス</label><input id="f-office" type="text" placeholder="例: 3号館 201"></div>
    <div class="form-group"><label>メモ</label><textarea id="f-note" placeholder="オフィスアワーなど"></textarea></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeClassForm()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveClass()">保存</button>
    </div>
    <div id="delete-btn-wrap" style="margin-top:8px;display:none">
      <button class="btn btn-danger" id="delete-class-btn">この授業を削除</button>
    </div>
  </div>
</div>

<!-- Schedule change modal -->
<div class="overlay center" id="sched-overlay" style="display:none" onclick="closeSchedForm(event)">
  <div class="modal">
    <div class="modal-drag"></div>
    <h2 id="sched-form-title">スケジュール変更</h2>
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px">この週の授業を移動・休講にします。通常の時間割には影響しません。</p>
    <div class="form-group">
      <label>変更の種類</label>
      <select id="s-type" onchange="updateSchedForm()">
        <option value="cancel">休講</option>
        <option value="move">別の日・時限に移動</option>
      </select>
    </div>
    <div id="s-move-fields" style="display:none">
      <div class="form-row">
        <div class="form-group">
          <label>移動先の曜日</label>
          <select id="s-day">
            <option value="0">月</option><option value="1">火</option>
            <option value="2">水</option><option value="3">木</option>
            <option value="4">金</option><option value="5">土</option>
          </select>
        </div>
        <div class="form-group">
          <label>移動先の時限</label>
          <select id="s-period">
            <option value="0">1限</option><option value="1">2限</option>
            <option value="2">3限</option><option value="3">4限</option>
            <option value="4">5限</option>
          </select>
        </div>
      </div>
    </div>
    <div class="form-group"><label>メモ（任意）</label><input id="s-note" type="text" placeholder="例: A棟101で実施"></div>

    <div id="s-existing-list" style="display:none">
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px">この週の既存の変更</div>
      <div class="schedule-list" id="s-existing-items"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeSchedForm()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveSchedChange()">保存</button>
    </div>
  </div>
</div>

<!-- Add assignment modal -->
<div class="overlay center" id="assign-overlay" style="display:none" onclick="closeAssignForm(event)">
  <div class="modal">
    <div class="modal-drag"></div>
    <h2>課題を追加</h2>
    <div class="form-group"><label>課題名 *</label><input id="a-name" type="text" placeholder="例: レポート第2回"></div>
    <div class="form-group"><label>授業</label><select id="a-class"></select></div>
    <div class="form-group"><label>期限</label><input id="a-due" type="date"></div>
    <div class="form-group"><label>メモ</label><textarea id="a-note" placeholder="詳細、提出方法など"></textarea></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeAssignForm()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveAssign()">保存</button>
    </div>
  </div>
</div>

<script>
const DAYS = ['月','火','水','木','金','土'];
const PERIOD_LABELS = ['1限','2限','3限','4限','5限'];
const PERIOD_TIMES = ['8:30〜10:00','10:20〜11:50','12:40〜14:10','14:30〜16:00','16:20〜17:50'];
const COLORS = ['c0','c1','c2','c3','c4','c5','c6','c7'];

let state = { classes: [], assignments: [], schedChanges: [] };
let editingClassId = null;
let schedClassId = null;
let weekOffset = 0;

function load() { try { const d = localStorage.getItem('univ_v2'); if(d) state = {...{classes:[],assignments:[],schedChanges:[]}, ...JSON.parse(d)}; } catch(e){} }
function save() { localStorage.setItem('univ_v2', JSON.stringify(state)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }

function getMondayOfWeek(offset=0) {
  const d = new Date(); const day = d.getDay();
  const diff = day===0 ? -6 : 1-day;
  d.setDate(d.getDate()+diff+offset*7); d.setHours(0,0,0,0); return d;
}
function weekKey(offset) {
  const m = getMondayOfWeek(offset);
  return m.toISOString().slice(0,10);
}

function switchTab(t) {
  document.getElementById('view-cal').style.display = t==='cal'?'':'none';
  document.getElementById('view-assign').style.display = t==='assign'?'':'none';
  document.getElementById('tab-cal').className = 'nav-tab'+(t==='cal'?' active':'');
  document.getElementById('tab-assign').className = 'nav-tab'+(t==='assign'?' active':'');
  if(t==='assign') renderAssignments();
}
function changeWeek(d) { weekOffset+=d; renderCalendar(); }

function renderCalendar() {
  const monday = getMondayOfWeek(weekOffset);
  const today = new Date(); today.setHours(0,0,0,0);
  const wk = weekKey(weekOffset);
  document.getElementById('week-label').textContent =
    monday.toLocaleDateString('ja-JP',{month:'long',day:'numeric'}) + ' 〜';

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // corner
  grid.appendChild(document.createElement('div'));

  // day headers
  for(let d=0;d<6;d++) {
    const dt = new Date(monday); dt.setDate(monday.getDate()+d);
    const isToday = dt.getTime()===today.getTime();
    const h = document.createElement('div');
    h.className = 'cal-head'+(isToday?' today':'');
    h.style.whiteSpace='pre'; h.style.lineHeight='1.4';
    h.textContent = DAYS[d]+'\n'+dt.getDate();
    grid.appendChild(h);
  }

  // rows
  for(let p=0;p<5;p++) {
    const tl = document.createElement('div');
    tl.className = 'time-label';
    tl.innerHTML = `<span class="tl-period">${PERIOD_LABELS[p]}</span><span class="tl-time">${PERIOD_TIMES[p].replace('〜','\n')}</span>`;
    grid.appendChild(tl);

    for(let d=0;d<6;d++) {
      const cell = document.createElement('div');
      cell.className = 'cal-cell';

      // スケジュール変更を考慮して表示する授業を決定
      const change = state.schedChanges.find(c=>c.week===wk && c.origDay===d && c.origPeriod===p);
      // 移動してきた授業があるか
      const movedHere = state.schedChanges.find(c=>c.week===wk && c.type==='move' && c.newDay===d && c.newPeriod===p);

      let cls = null;
      if(change && change.type==='cancel') {
        // 休講 → 空
      } else if(change && change.type==='move') {
        // 移動で元が空
      } else {
        cls = state.classes.find(c=>c.day===d && c.period===p);
      }
      // 移動先に表示
      if(movedHere) {
        cls = state.classes.find(c=>c.day===movedHere.origDay && c.period===movedHere.origPeriod);
      }

      if(cls) {
        const hasUndone = state.assignments.some(a=>a.classId===cls.id && !a.done);
        const isChanged = !!change || !!movedHere;
        const block = document.createElement('div');
        block.className = 'class-block '+COLORS[cls.colorIdx%8];
        block.innerHTML = `<div class="cb-name">${cls.name}</div><div class="cb-room">${isChanged?'<span style="color:var(--warning);font-size:9px">変更</span> ':''}${cls.room||''}</div>${hasUndone?'<div class="cb-badge"></div>':''}`;
        cell.appendChild(block);
        cell.onclick = ()=>openDetail(cls.id);
      } else if(change && change.type==='cancel') {
        const block = document.createElement('div');
        block.className = 'class-block';
        block.style.cssText = 'background:rgba(248,113,113,.1);border-left:3px solid var(--danger)';
        block.innerHTML = `<div style="font-size:10px;color:var(--danger);font-weight:700">休講</div>${change.note?`<div style="font-size:9px;color:var(--muted)">${change.note}</div>`:''}`;
        cell.appendChild(block);
        cell.onclick = ()=>openDetail(null, change);
      } else {
        cell.onclick = ()=>openAddClassAt(d,p);
      }
      grid.appendChild(cell);
    }
  }
}

function openDetail(id, change=null) {
  let cls = id ? state.classes.find(c=>c.id===id) : null;
  if(!cls && !change) return;
  const wk = weekKey(weekOffset);
  const existingChange = cls ? state.schedChanges.find(c=>c.week===wk && c.origDay===cls.day && c.origPeriod===cls.period) : null;
  const assigns = cls ? state.assignments.filter(a=>a.classId===cls.id) : [];

  let html = '';
  if(change && !cls) {
    html = `<h2>休講</h2><p style="color:var(--muted);font-size:14px">${change.note||'この週は休講です'}</p>
    <div class="btn-row"><button class="btn btn-secondary" onclick="closeDetail()">閉じる</button></div>`;
  } else {
    html = `<h2>${cls.name}</h2>`;
    if(existingChange) {
      html += `<div style="background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);border-radius:8px;padding:8px 12px;margin-bottom:14px;font-size:13px;color:var(--warning)">
        この週は${existingChange.type==='cancel'?'休講':'時限変更'}が設定されています
        <button onclick="removeSchedChange('${existingChange.id}')" style="background:none;border:none;color:var(--danger);cursor:pointer;float:right;font-size:12px">削除</button>
      </div>`;
    }
    if(cls.room) html+=`<div class="detail-section"><div class="detail-label">教室</div><div class="detail-value">🏛 ${cls.room}</div></div>`;
    if(cls.teacher) html+=`<div class="detail-section"><div class="detail-label">担当教員</div><div class="detail-value">👤 ${cls.teacher}</div></div>`;
    if(cls.email) html+=`<div class="detail-section"><div class="detail-label">メールアドレス</div><div class="detail-value"><a href="mailto:${cls.email}">✉️ ${cls.email}</a></div></div>`;
    if(cls.office) html+=`<div class="detail-section"><div class="detail-label">オフィス</div><div class="detail-value">🚪 ${cls.office}</div></div>`;
    if(cls.note) html+=`<div class="detail-section"><div class="detail-label">メモ</div><div class="detail-value" style="color:var(--muted);font-size:14px">${cls.note}</div></div>`;

    html+=`<div class="section-header"><span>課題 (${assigns.filter(a=>!a.done).length}件未完了)</span><button class="add-small" onclick="openAddAssignFor('${cls.id}')">＋追加</button></div>`;
    if(assigns.length===0) {
      html+=`<p style="color:var(--muted);font-size:13px;text-align:center;padding:12px">課題はありません</p>`;
    } else {
      html+=`<div class="assign-list-modal">`;
      assigns.forEach(a=>{
        const dueStr=a.due?formatDue(a.due):''; const dueClass=a.due?getDueClass(a.due):'';
        html+=`<div class="assign-row">
          <div class="assign-check${a.done?' done':''}" onclick="toggleAssign('${a.id}',true,'${cls.id}')"></div>
          <div class="assign-row-info">
            <div class="assign-row-name${a.done?' done':''}">${a.name}</div>
            ${a.due?`<div class="assign-row-due"><span class="assign-due ${dueClass}">${dueStr}</span></div>`:''}
            ${a.note?`<div class="assign-row-due">${a.note}</div>`:''}
          </div>
          <button class="del-btn" onclick="deleteAssign('${a.id}',true,'${cls.id}')">🗑</button>
        </div>`;
      });
      html+=`</div>`;
    }
    html+=`<div class="btn-row" style="margin-top:16px">
      <button class="btn btn-secondary" onclick="closeDetail()">閉じる</button>
      <button class="btn btn-secondary" onclick="closeDetail();openSchedChange('${cls.id}')">📅 変更</button>
      <button class="btn btn-primary" onclick="closeDetail();openEditClass('${cls.id}')">✏️ 編集</button>
    </div>`;
  }
  document.getElementById('detail-content').innerHTML = html;
  document.getElementById('detail-overlay').style.display = 'flex';
}

function closeDetail(e) {
  if(!e || e.target===document.getElementById('detail-overlay')) {
    document.getElementById('detail-overlay').style.display='none';
    renderCalendar();
  }
}

function removeSchedChange(id) {
  state.schedChanges = state.schedChanges.filter(c=>c.id!==id);
  save(); closeDetail(); renderCalendar();
}

// スケジュール変更
function openSchedChange(classId) {
  schedClassId = classId;
  const cls = state.classes.find(c=>c.id===classId);
  document.getElementById('sched-form-title').textContent = `${cls.name} のスケジュール変更`;
  document.getElementById('s-type').value = 'cancel';
  document.getElementById('s-note').value = '';
  document.getElementById('s-day').value = cls.day;
  document.getElementById('s-period').value = cls.period;
  updateSchedForm();

  // 既存の変更を表示
  const wk = weekKey(weekOffset);
  const existing = state.schedChanges.filter(c=>c.week===wk && c.origDay===cls.day && c.origPeriod===cls.period);
  const wrap = document.getElementById('s-existing-list');
  const items = document.getElementById('s-existing-items');
  if(existing.length>0) {
    wrap.style.display='block';
    items.innerHTML = existing.map(c=>`
      <div class="schedule-item">
        <div class="schedule-item-info">
          <div>${c.type==='cancel'?'休講':`→ ${DAYS[c.newDay]} ${PERIOD_LABELS[c.newPeriod]}`}</div>
          <div class="schedule-item-sub">${c.note||''}</div>
        </div>
        <button onclick="removeSchedChange('${c.id}')" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:13px">削除</button>
      </div>`).join('');
  } else { wrap.style.display='none'; }

  document.getElementById('sched-overlay').style.display='flex';
}

function updateSchedForm() {
  const t = document.getElementById('s-type').value;
  document.getElementById('s-move-fields').style.display = t==='move'?'':'none';
}

function closeSchedForm(e) {
  if(!e || e.target===document.getElementById('sched-overlay'))
    document.getElementById('sched-overlay').style.display='none';
}

function saveSchedChange() {
  const cls = state.classes.find(c=>c.id===schedClassId);
  const type = document.getElementById('s-type').value;
  const wk = weekKey(weekOffset);
  const entry = { id:uid(), week:wk, type, origDay:cls.day, origPeriod:cls.period, note:document.getElementById('s-note').value };
  if(type==='move') {
    entry.newDay = +document.getElementById('s-day').value;
    entry.newPeriod = +document.getElementById('s-period').value;
  }
  state.schedChanges.push(entry);
  save(); closeSchedForm(); renderCalendar();
}

// Class CRUD
function openAddClass() { openAddClassAt(0,0); }
function openAddClassAt(day, period) {
  editingClassId = null;
  document.getElementById('class-form-title').textContent = '授業を追加';
  document.getElementById('f-name').value=''; document.getElementById('f-day').value=day;
  document.getElementById('f-period').value=period; document.getElementById('f-room').value='';
  document.getElementById('f-teacher').value=''; document.getElementById('f-email').value='';
  document.getElementById('f-office').value=''; document.getElementById('f-note').value='';
  document.getElementById('delete-btn-wrap').style.display='none';
  document.getElementById('class-overlay').style.display='flex';
}
function openEditClass(id) {
  const cls = state.classes.find(c=>c.id===id); if(!cls) return;
  editingClassId = id;
  document.getElementById('class-form-title').textContent='授業を編集';
  document.getElementById('f-name').value=cls.name; document.getElementById('f-day').value=cls.day;
  document.getElementById('f-period').value=cls.period; document.getElementById('f-room').value=cls.room||'';
  document.getElementById('f-teacher').value=cls.teacher||''; document.getElementById('f-email').value=cls.email||'';
  document.getElementById('f-office').value=cls.office||''; document.getElementById('f-note').value=cls.note||'';
  document.getElementById('delete-btn-wrap').style.display='block';
  document.getElementById('delete-class-btn').onclick = deleteClass;
  document.getElementById('class-overlay').style.display='flex';
}
function closeClassForm(e) {
  if(!e || e.target===document.getElementById('class-overlay'))
    document.getElementById('class-overlay').style.display='none';
}
function saveClass() {
  const name = document.getElementById('f-name').value.trim();
  if(!name){alert('授業名を入力してください');return;}
  const day=+document.getElementById('f-day').value, period=+document.getElementById('f-period').value;
  const conflict = state.classes.find(c=>c.day===day&&c.period===period&&c.id!==editingClassId);
  if(conflict){alert(`${DAYS[day]}曜 ${period+1}限には「${conflict.name}」が既にあります`);return;}
  const data = { name, day, period, room:document.getElementById('f-room').value, teacher:document.getElementById('f-teacher').value, email:document.getElementById('f-email').value, office:document.getElementById('f-office').value, note:document.getElementById('f-note').value };
  if(editingClassId) { Object.assign(state.classes.find(c=>c.id===editingClassId), data); }
  else { state.classes.push({id:uid(), colorIdx:state.classes.length, ...data}); }
  save(); closeClassForm(); renderCalendar();
}
function deleteClass() {
  if(!confirm('この授業を削除しますか？（関連課題も削除されます）')) return;
  state.classes = state.classes.filter(c=>c.id!==editingClassId);
  state.assignments = state.assignments.filter(a=>a.classId!==editingClassId);
  state.schedChanges = state.schedChanges.filter(c=>{
    const cls = state.classes.find(x=>x.id===editingClassId);
    return !(cls && c.origDay===cls.day && c.origPeriod===cls.period);
  });
  save(); closeClassForm(); renderCalendar();
}

// Assignments
function openAddAssign() { populateClassSelect(); document.getElementById('a-name').value=''; document.getElementById('a-due').value=''; document.getElementById('a-note').value=''; document.getElementById('assign-overlay').style.display='flex'; }
function openAddAssignFor(classId) { closeDetail(); populateClassSelect(classId); document.getElementById('a-name').value=''; document.getElementById('a-due').value=''; document.getElementById('a-note').value=''; document.getElementById('assign-overlay').style.display='flex'; }
function populateClassSelect(sel) {
  const s=document.getElementById('a-class');
  s.innerHTML='<option value="">（授業なし）</option>';
  state.classes.forEach(c=>{ const o=document.createElement('option'); o.value=c.id; o.textContent=c.name; if(sel&&c.id===sel) o.selected=true; s.appendChild(o); });
}
function closeAssignForm(e) { if(!e||e.target===document.getElementById('assign-overlay')) document.getElementById('assign-overlay').style.display='none'; }
function saveAssign() {
  const name=document.getElementById('a-name').value.trim(); if(!name){alert('課題名を入力してください');return;}
  state.assignments.push({id:uid(),name,classId:document.getElementById('a-class').value||null,due:document.getElementById('a-due').value,note:document.getElementById('a-note').value,done:false});
  save(); closeAssignForm(); renderAssignments();
}
function toggleAssign(id,fromDetail=false,classId=null) {
  const a=state.assignments.find(x=>x.id===id); if(a) a.done=!a.done;
  save(); if(fromDetail&&classId) openDetail(classId); else { renderAssignments(); renderCalendar(); }
}
function deleteAssign(id,fromDetail=false,classId=null) {
  state.assignments=state.assignments.filter(x=>x.id!==id);
  save(); if(fromDetail&&classId) openDetail(classId); else renderAssignments();
}
function formatDue(due) {
  const d=new Date(due+'T00:00:00'), today=new Date(); today.setHours(0,0,0,0);
  const diff=Math.round((d-today)/(1000*60*60*24));
  if(diff<0) return `${Math.abs(diff)}日超過`; if(diff===0) return '今日締切'; if(diff===1) return '明日締切';
  return `${d.getMonth()+1}/${d.getDate()} まで`;
}
function getDueClass(due) {
  const d=new Date(due+'T00:00:00'), today=new Date(); today.setHours(0,0,0,0);
  const diff=Math.round((d-today)/(1000*60*60*24));
  if(diff<0||diff<=1) return diff<0?'due-soon':'due-today'; if(diff<=3) return 'due-soon'; return 'due-ok';
}
function renderAssignments() {
  const list=document.getElementById('assign-list');
  const sorted=[...state.assignments].sort((a,b)=>{ if(!a.due&&!b.due) return 0; if(!a.due) return 1; if(!b.due) return -1; return a.due.localeCompare(b.due); });
  if(sorted.length===0){ list.innerHTML=`<div class="empty"><div>📋</div><p>課題はありません<br>「＋課題」ボタンで追加できます</p></div>`; return; }
  list.innerHTML=sorted.map(a=>{
    const cls=state.classes.find(c=>c.id===a.classId);
    const dueStr=a.due?formatDue(a.due):''; const dueClass=a.due?getDueClass(a.due):'';
    return `<div class="assign-item">
      <div class="assign-check${a.done?' done':''}" onclick="toggleAssign('${a.id}')"></div>
      <div class="assign-info">
        <div class="assign-name${a.done?' done':''}">${a.name}</div>
        <div class="assign-meta">${cls?cls.name:'科目なし'}</div>
        ${a.due?`<span class="assign-due ${dueClass}">${dueStr}</span>`:''}
        ${a.note?`<div class="assign-meta" style="margin-top:4px">${a.note}</div>`:''}
      </div>
      <button class="del-btn" onclick="deleteAssign('${a.id}')">🗑</button>
    </div>`;
  }).join('');
}

load(); renderCalendar();
</script>
</body>
</html>
